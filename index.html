            padding: 32px 20px;
            text-align: center;
            margin-bottom: 28px;
            border: 1px solid rgba(75, 140, 80, 0.2);

        .loader {

            height: 52px;
            border: 2.5px solid rgba(76, 175, 80, 0.2);

            border-radius: 50%;
            animation: spin 0.85s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {

        }

        .step-primary {

            font-weight: 600;
            letter-spacing: -0.2px;
            margin-top: 8px;
        }

        .step-secondary {
            font-size: 13px;
            color: #7c8dab;
            margin-top: 8px;
        }

        .hidden {

        }

        .social-link {

            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);

            color: #cbd5e6;

        .social-link:hover {
